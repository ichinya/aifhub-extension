# Plan Status Schema
# Tracks the current state of the plan workflow

plan_id: {{plan_id}}
title: {{task_title}}
created: {{created_date}}
updated: {{updated_date}}

# Workflow state
# draft → implementing → verifying → fixing → done
status: draft

# Progress tracking
progress:
  scope_total: 0
  scope_completed: 0
  tests_total: 0
  tests_passed: 0

# Execution state (updated by aif-implement)
execution:
  mode: local
  subagent: null
  mode_resolved_at: null
  current_task: null
  max_fix_loops: 3
  quality_checks: []

# Workflow history
history:
  - timestamp: {{created_date}}
    event: created
    from: null
    to: draft

# Verification results (updated by aif-verify+)
verification:
  last_run: null
  verdict: null  # pass | pass-with-notes | fail
  findings:
    blocking: 0
    important: 0
    optional: 0
  checks:
    task_completeness: null
    rules_compliance: null
    constraints: null
    code_quality:
      build: null
      tests: null
      lint: null
    architecture: null
    documentation: null

# Fix tracking (updated by aif-fix)
fixes:
  total_applied: 0
  iterations: 0
  last_fix: null
  files: []
  applied: []
    # - finding_id: B001
    #   fixed_at: timestamp
    #   description: "What was fixed"
    #   artifact: ".ai-factory/plans/<plan-id>/fixes/<timestamp>-B001.md"

# Links
links:
  issue: null
  pr: null
  parent_plan: null
  depends_on: []

# Completion metadata (updated by aif-done)
completed_at: null
archived_to: null

# Notes
notes: |
  Additional context or notes about this plan.
